{% extends "layouts/dashboard.html" %}

{% block dashboard_title %}Create Election{% endblock %}
{% block page_heading %}Create Election{% endblock %}

{% block dashboard_content %}
<div class="mx-auto max-w-2xl" x-data="electionFormPage()" x-init="init()">
  <div x-show="error" class="mb-4 rounded-lg bg-red-50 p-4 text-sm text-red-700" x-text="error"></div>

  <form @submit.prevent="submit" class="card space-y-4">
    <div>
      <label class="form-label" for="title">Title</label>
      <input id="title" x-model="form.title" class="form-input mt-1" required>
    </div>
    <div>
      <label class="form-label" for="description">Description</label>
      <textarea id="description" x-model="form.description" rows="4" class="form-input mt-1"></textarea>
    </div>
    <div>
      <label class="form-label" for="election_type">Election Type</label>
      <select id="election_type" x-model="form.election_type" class="form-input mt-1" required>
        <option value="general">General</option>
        <option value="student_union">Student Union</option>
        <option value="faculty">Faculty</option>
        <option value="departmental">Departmental</option>
        <option value="special">Special</option>
      </select>
    </div>
    <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
      <div>
        <label class="form-label" for="start_date">Start Date</label>
        <input id="start_date" type="datetime-local" x-model="form.start_date" class="form-input mt-1" required>
      </div>
      <div>
        <label class="form-label" for="end_date">End Date</label>
        <input id="end_date" type="datetime-local" x-model="form.end_date" class="form-input mt-1" required>
      </div>
    </div>
    <div class="space-y-2">
      <label class="flex items-center gap-2 text-sm text-slate-700">
        <input type="checkbox" x-model="form.allow_web_voting" class="rounded border-slate-300 text-brand-600">
        Allow Web Voting
      </label>
      <label class="flex items-center gap-2 text-sm text-slate-700">
        <input type="checkbox" x-model="form.allow_ussd_voting" class="rounded border-slate-300 text-brand-600">
        Allow USSD Voting
      </label>
      <label class="flex items-center gap-2 text-sm text-slate-700">
        <input type="checkbox" x-model="form.allow_sms_notifications" class="rounded border-slate-300 text-brand-600">
        Allow SMS Notifications
      </label>
    </div>
    <div class="flex gap-3">
      <button type="submit" class="btn-primary" :disabled="loading">
        <span x-show="!loading">Create Election</span>
        <span x-show="loading">Creating...</span>
      </button>
      <a href="/dashboard/elections/" class="btn-secondary">Cancel</a>
    </div>
  </form>
</div>

<script>
function electionFormPage() {
  return {
    loading: false,
    error: null,
    form: {
      title: "",
      description: "",
      election_type: "general",
      start_date: "",
      end_date: "",
      allow_web_voting: true,
      allow_ussd_voting: false,
      allow_sms_notifications: false,
    },
    init() {},
    async submit() {
      this.loading = true;
      this.error = null;
      try {
        const payload = {
          ...this.form,
          start_date: new Date(this.form.start_date).toISOString(),
          end_date: new Date(this.form.end_date).toISOString(),
        };
        const result = await VoteBridgeAPI.postJson("/elections/", payload);
        window.location.href = `/dashboard/elections/${result.data.uuid}/`;
      } catch (e) {
        this.error = e.message;
      } finally {
        this.loading = false;
      }
    },
  };
}
</script>
{% endblock %}
