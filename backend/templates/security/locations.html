{% extends "layouts/dashboard.html" %}

{% block dashboard_title %}Location Monitoring{% endblock %}
{% block page_heading %}Location Monitoring{% endblock %}

{% block dashboard_content %}
<div x-data="locationMonitoringPage()" x-init="load()">
  <div class="mb-4">
    <a href="/dashboard/security/" class="text-sm text-brand-600 hover:text-brand-800">← Security Center</a>
  </div>
  <div x-show="error" class="mb-4 rounded-lg bg-red-50 p-4 text-sm text-red-700" x-text="error"></div>
  <div x-show="loading" class="text-sm text-slate-500">Loading locations...</div>

  <div class="overflow-hidden rounded-xl ring-1 ring-slate-900/5" x-show="!loading">
    <table class="min-w-full divide-y divide-slate-200">
      <thead class="bg-slate-50">
        <tr>
          <th class="px-4 py-3 text-left text-xs font-semibold text-slate-600">IP Address</th>
          <th class="px-4 py-3 text-left text-xs font-semibold text-slate-600">Country</th>
          <th class="px-4 py-3 text-left text-xs font-semibold text-slate-600">Region</th>
          <th class="px-4 py-3 text-left text-xs font-semibold text-slate-600">City</th>
          <th class="px-4 py-3 text-left text-xs font-semibold text-slate-600">Last Seen</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-100 bg-white">
        <template x-for="loc in locations" :key="loc.location_log_id">
          <tr>
            <td class="px-4 py-3 text-sm font-mono text-slate-900" x-text="loc.ip_address"></td>
            <td class="px-4 py-3 text-sm text-slate-600" x-text="loc.country || '—'"></td>
            <td class="px-4 py-3 text-sm text-slate-600" x-text="loc.region || '—'"></td>
            <td class="px-4 py-3 text-sm text-slate-600" x-text="loc.city || '—'"></td>
            <td class="px-4 py-3 text-sm text-slate-600" x-text="formatDate(loc.last_seen_at)"></td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>
</div>

<script>
function locationMonitoringPage() {
  return {
    locations: [],
    loading: false,
    error: null,
    async load() {
      this.loading = true;
      try {
        const result = await VoteBridgeAPI.getJson("/security/monitoring/locations/");
        this.locations = result.data || [];
      } catch (e) {
        this.error = e.message;
      } finally {
        this.loading = false;
      }
    },
    formatDate(v) { return new Date(v).toLocaleString(); },
  };
}
</script>
{% endblock %}
