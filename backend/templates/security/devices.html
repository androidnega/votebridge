{% extends "layouts/dashboard.html" %}

{% block dashboard_title %}Device Monitoring{% endblock %}
{% block page_heading %}Device Monitoring{% endblock %}

{% block dashboard_content %}
<div x-data="deviceMonitoringPage()" x-init="load()">
  <div class="mb-4">
    <a href="/dashboard/security/" class="text-sm text-brand-600 hover:text-brand-800">← Security Center</a>
  </div>
  <div x-show="error" class="mb-4 rounded-lg bg-red-50 p-4 text-sm text-red-700" x-text="error"></div>
  <div x-show="loading" class="text-sm text-slate-500">Loading devices...</div>

  <div class="overflow-hidden rounded-xl ring-1 ring-slate-900/5" x-show="!loading">
    <table class="min-w-full divide-y divide-slate-200">
      <thead class="bg-slate-50">
        <tr>
          <th class="px-4 py-3 text-left text-xs font-semibold text-slate-600">User</th>
          <th class="px-4 py-3 text-left text-xs font-semibold text-slate-600">Type</th>
          <th class="px-4 py-3 text-left text-xs font-semibold text-slate-600">OS</th>
          <th class="px-4 py-3 text-left text-xs font-semibold text-slate-600">Last Seen</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-slate-100 bg-white">
        <template x-for="device in devices" :key="device.device_log_id">
          <tr>
            <td class="px-4 py-3 text-sm">
              <p class="font-medium text-slate-900" x-text="device.user_name || 'Anonymous'"></p>
              <p class="text-xs text-slate-500" x-text="device.user_email || ''"></p>
            </td>
            <td class="px-4 py-3 text-sm text-slate-600" x-text="device.device_type"></td>
            <td class="px-4 py-3 text-sm text-slate-600" x-text="device.operating_system"></td>
            <td class="px-4 py-3 text-sm text-slate-600" x-text="formatDate(device.last_seen_at)"></td>
          </tr>
        </template>
      </tbody>
    </table>
  </div>
</div>

<script>
function deviceMonitoringPage() {
  return {
    devices: [],
    loading: false,
    error: null,
    async load() {
      this.loading = true;
      try {
        const result = await VoteBridgeAPI.getJson("/security/monitoring/devices/");
        this.devices = result.data || [];
      } catch (e) {
        this.error = e.message;
      } finally {
        this.loading = false;
      }
    },
    formatDate(v) { return new Date(v).toLocaleString(); },
  };
}
</script>
{% endblock %}
